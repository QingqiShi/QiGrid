name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm check

      - name: Unit tests
        run: pnpm test

      - name: Bundle size gate
        run: pnpm --filter @qigrid/core size

      - name: Install Playwright browsers
        run: pnpm --filter @qigrid/playground exec playwright install --with-deps chromium

      - name: E2E tests
        id: e2e
        run: pnpm --filter @qigrid/playground e2e

      - name: Publish visual diffs
        id: publish-diffs
        if: failure() && steps.e2e.conclusion == 'failure' && github.event_name == 'pull_request'
        run: |
          PR=${{ github.event.pull_request.number }}
          DIFF_DIR="apps/playground/test-results"

          # Check if there are any actual/diff images
          if ! find "$DIFF_DIR" \( -name "*-actual.png" -o -name "*-diff.png" \) 2>/dev/null | head -1 | grep -q .; then
            echo "No visual diff images found — this is a non-visual test failure"
            exit 0
          fi

          # Push diff images to an orphan branch for inline rendering
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BRANCH="visual-diffs/pr-${PR}"
          git checkout --orphan "$BRANCH"
          git rm -rf --cached .
          git add -f "$DIFF_DIR"
          git commit -m "Visual diffs for PR #${PR}"
          git push origin "$BRANCH" --force

      - name: Comment on PR with visual diffs
        if: failure() && steps.publish-diffs.conclusion == 'success' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const pr = context.payload.pull_request.number;
            const branch = `visual-diffs/pr-${pr}`;
            const baseUrl = `https://raw.githubusercontent.com/${context.repo.owner}/${context.repo.repo}/${branch}`;
            const diffDir = 'apps/playground/test-results';

            // Find all diff image pairs
            const diffs = [];
            function walk(dir) {
              if (!fs.existsSync(dir)) return;
              for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
                const full = path.join(dir, entry.name);
                if (entry.isDirectory()) walk(full);
                else if (entry.name.endsWith('-actual.png')) {
                  const base = entry.name.replace('-actual.png', '');
                  diffs.push({
                    name: base,
                    dir: dir,
                    actual: `${baseUrl}/${full}`,
                    diff: fs.existsSync(path.join(dir, `${base}-diff.png`))
                      ? `${baseUrl}/${path.join(dir, `${base}-diff.png`)}`
                      : null,
                  });
                }
              }
            }
            walk(diffDir);

            if (diffs.length === 0) {
              // Non-visual failure — no comment needed
              return;
            }

            let body = '## Visual Regression Detected\n\n';
            body += 'The following screenshots differ from the baselines:\n\n';

            for (const d of diffs) {
              body += `### ${d.name}\n\n`;
              body += `| Actual | Diff |\n|---|---|\n`;
              body += `| ![actual](${d.actual}) | ${d.diff ? `![diff](${d.diff})` : 'N/A'} |\n\n`;
            }

            body += '---\n\n';
            body += 'If these changes are intentional, comment `/update-snapshots` to generate and commit updated baselines.\n';

            // Find and update existing bot comment, or create new one
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
            });
            const existing = comments.data.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Visual Regression Detected')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
                body,
              });
            }
