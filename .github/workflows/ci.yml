name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm check

      - name: Unit tests
        run: pnpm test

      - name: Bundle size gate
        run: pnpm --filter @qigrid/core size

      - name: Install Playwright browsers
        run: pnpm --filter @qigrid/playground exec playwright install --with-deps chromium

      - name: E2E tests
        id: e2e
        run: pnpm --filter @qigrid/playground e2e

      - name: Upload Playwright diffs
        if: failure() && steps.e2e.conclusion == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/playground/test-results/
          retention-days: 7

      - name: Comment on PR with visual diff info
        if: failure() && steps.e2e.conclusion == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: [
                '## Visual Regression Detected',
                '',
                'E2E tests failed — this may be due to visual screenshot differences.',
                '',
                `**[Download the Playwright report](${runUrl}#artifacts)** to review the screenshot diffs (expected vs actual vs diff images).`,
                '',
                'If the visual changes are intentional, comment `/update-snapshots` on this PR to generate and commit updated Linux baselines.',
              ].join('\n'),
            });
