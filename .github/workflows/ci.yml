name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm check

      - name: Unit tests
        run: pnpm test

      - name: Bundle size gate
        run: pnpm --filter @qigrid/core size

      - name: Install Playwright browsers
        run: pnpm --filter @qigrid/playground exec playwright install --with-deps chromium

      - name: Generate Linux visual baselines
        run: pnpm --filter @qigrid/playground exec playwright test --update-snapshots

      - name: Upload Linux baselines
        uses: actions/upload-artifact@v4
        with:
          name: linux-screenshots
          path: apps/playground/e2e/__screenshots__/**/linux/
