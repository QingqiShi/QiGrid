name: Update Visual Baselines

on:
  issue_comment:
    types: [created]

jobs:
  update-baselines:
    if: >
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/update-snapshots')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check authorization
        uses: actions/github-script@v7
        with:
          script: |
            const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.payload.comment.user.login,
            });
            if (!['admin', 'write'].includes(perm.permission)) {
              core.setFailed(`User ${context.payload.comment.user.login} does not have write access`);
            }

      - name: Get PR branch
        uses: actions/github-script@v7
        id: pr
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            return pr.data.head.ref;
          result-encoding: string

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.result }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm --filter @qigrid/playground exec playwright install --with-deps chromium

      - name: Generate updated baselines
        run: pnpm --filter @qigrid/playground exec playwright test e2e/visual.spec.ts --update-snapshots

      - name: Commit and push baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/playground/e2e/__screenshots__/
          git diff --cached --quiet && echo "No baseline changes" && exit 0
          git commit -m "chore: update visual regression baselines"
          git push

      - name: Clean up diff branch
        continue-on-error: true
        run: |
          PR=${{ github.event.issue.number }}
          git push origin --delete "visual-diffs/pr-${PR}" || true

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'Visual baselines have been updated and pushed. CI will re-run automatically.',
            });
